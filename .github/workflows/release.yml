name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: baro-darwin-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: baro-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: baro-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: baro-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: baro-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/baro ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/baro.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: binaries/**/*
          generate_release_notes: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        # Workspace install (root) — pulls deps for both baro-app and
        # baro-orchestrator. tsup needs this to resolve cross-workspace
        # imports when bundling cli.mjs.
        run: npm install --workspaces --include-workspace-root

      - name: Build npm bundles (openai-planner + Mozaik orchestrator cli.mjs)
        working-directory: packages/baro-app
        run: npm run build

      - name: Sync README from root to npm package
        run: cp README.md packages/baro-app/README.md

      - name: Clean native binaries before publish
        working-directory: packages/baro-app
        run: rm -f bin/baro-native bin/baro-native.exe

      - name: Publish to npm
        working-directory: packages/baro-app
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
